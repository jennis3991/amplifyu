<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AmplifyU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Cormorant Garamond: editorial display — elegant, warm, authoritative -->
    <!-- Inter: clean UI body — precise, readable, modern -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* ── Reset ─────────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        scroll-behavior: smooth;
      }

      /* ── Soho Home base ─────────────────────────────────────────────────── */
      body {
        background: #F7F3EC;
        font-family: 'Inter', -apple-system, sans-serif;
        font-weight: 300;
        color: #2C2416;
      }

      /* ── Precision scrollbar ────────────────────────────────────────────── */
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(138,158,132,0.3); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(138,158,132,0.5); }

      /* ── Selection — sage green ─────────────────────────────────────────── */
      ::selection { background: rgba(138,158,132,0.2); color: inherit; }

      /* ── Inputs ─────────────────────────────────────────────────────────── */
      input, textarea {
        font-family: 'Inter', -apple-system, sans-serif;
        font-weight: 300;
        color: #2C2416;
      }
      input::placeholder, textarea::placeholder {
        color: #B8AFA4;
        font-style: italic;
        font-weight: 300;
      }
      input:focus, textarea:focus {
        outline: none;
        box-shadow: 0 0 0 2px rgba(138,158,132,0.25);
      }

      button { cursor: pointer; font-family: 'Inter', -apple-system, sans-serif; }
      * { -webkit-tap-highlight-color: transparent; }

      /* ── Grain overlay ──────────────────────────────────────────────────── */
      .au-grain-wrap::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 9000;
        pointer-events: none;
        opacity: 0.02;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 200px 200px;
      }

      /* ── Warm shadow system ─────────────────────────────────────────────── */
      .au-shadow-sm  { box-shadow: 0 1px 4px rgba(44,36,22,0.06), 0 1px 2px rgba(44,36,22,0.03); }
      .au-shadow-md  { box-shadow: 0 4px 16px rgba(44,36,22,0.08), 0 1px 4px rgba(44,36,22,0.04); }
      .au-shadow-lg  { box-shadow: 0 8px 32px rgba(44,36,22,0.09), 0 2px 8px rgba(44,36,22,0.05); }
      .au-shadow-gold{ box-shadow: 0 4px 24px rgba(138,158,132,0.25); }

      /* ── Animations ─────────────────────────────────────────────────────── */
      @keyframes fadeIn      { from { opacity: 0; }                              to { opacity: 1; } }
      @keyframes fadeUp      { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeDown    { from { opacity: 0; transform: translateY(-16px); }to { opacity: 1; transform: translateY(0); } }
      @keyframes slideUp     { from { transform: translateY(100%); }             to { transform: translateY(0); } }
      @keyframes heroPan     { from { transform: scale(1.04); }                  to { transform: scale(1); } }
      @keyframes sectionFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes glowPulse   { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.6; } }
      @keyframes shimmer     { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
      @keyframes breathe     { 0%, 100% { opacity: 0.4; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } }
      @keyframes coachReveal { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

      /* ── Utility classes ────────────────────────────────────────────────── */
      .au-page       { animation: fadeIn 0.45s ease both; }
      .au-hero-scene { animation: heroPan 14s ease both; transform-origin: center; }
      .au-step-enter { animation: fadeUp 0.5s cubic-bezier(0.25,0.46,0.45,0.94) both; }

      .au-lift { transition: transform 0.28s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.28s ease; }
      .au-lift:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(44,36,22,0.09), 0 2px 6px rgba(44,36,22,0.05); }

      .au-row { transition: background 0.18s ease; }
      .au-row:hover { background: rgba(138,158,132,0.05) !important; }

      .au-nav-btn { transition: color 0.18s ease, background 0.18s ease; }

      .au-cta {
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      }
      .au-cta:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(138,158,132,0.3) !important;
      }
      .au-cta:active { transform: scale(0.98); }

      .au-coach-enter { animation: coachReveal 0.5s cubic-bezier(0.25,0.46,0.45,0.94) both; }

      /* ── Soho Home card — linen feel ────────────────────────────────────── */
      .au-card {
        background: #EDE8DF;
        border: 0.5px solid #DDD5C4;
        border-radius: 4px;
        box-shadow: 0 2px 10px rgba(44,36,22,0.05), 0 1px 3px rgba(44,36,22,0.03);
      }

      /* ── Dark warm card ─────────────────────────────────────────────────── */
      .au-card-dark {
        background: #231E18;
        border: 0.5px solid rgba(255,255,255,0.06);
        border-radius: 4px;
      }

      /* ── Soho input ─────────────────────────────────────────────────────── */
      .au-input {
        background: #F7F3EC;
        border: 0.5px solid #DDD5C4;
        border-radius: 3px;
        padding: 12px 16px;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 300;
        color: #2C2416;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
        resize: none;
        width: 100%;
      }
      .au-input:focus {
        border-color: rgba(138,158,132,0.5);
        box-shadow: 0 0 0 3px rgba(138,158,132,0.12);
      }

      /* ── Primary button — deep charcoal, rectangular ────────────────────── */
      .au-btn-primary {
        background: #2C2416;
        color: #F7F3EC;
        border: none;
        border-radius: 3px;
        padding: 11px 24px;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.3px;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        transition: all 0.2s ease;
      }
      .au-btn-primary:hover {
        background: #1A1510;
        box-shadow: 0 4px 16px rgba(44,36,22,0.2);
        transform: translateY(-1px);
      }

      /* ── Secondary button — ghost, warm border ──────────────────────────── */
      .au-btn-secondary {
        background: transparent;
        color: #6B5E44;
        border: 0.5px solid #DDD5C4;
        border-radius: 3px;
        padding: 10px 22px;
        font-size: 13px;
        font-weight: 400;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        transition: all 0.2s ease;
      }
      .au-btn-secondary:hover {
        border-color: rgba(44,36,22,0.25);
        color: #2C2416;
        background: rgba(44,36,22,0.03);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
